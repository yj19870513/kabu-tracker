name: 株価データ自動更新

on:
  schedule:
    # JST 11:35 / 15:35 / 18:00（UTC+9）の平日のみ
    - cron: "35 2 * * 1-5"   # JST 11:35
    - cron: "35 6 * * 1-5"   # JST 15:35
    - cron: "0 9 * * 1-5"    # JST 18:00
  workflow_dispatch: {}       # 手動実行ボタンも有効化

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 依存ライブラリをインストール
        run: pip install yfinance

      - name: 株価データ取得
        run: python scripts/fetch_stocks.py

      - name: 銘柄名・セクターを日本語化
        run: python scripts/translate_names.py

      - name: 変更があればコミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stocks.json
          git diff --cached --quiet && echo "変更なし" || (git commit -m "データ自動更新 $(date +'%Y-%m-%d %H:%M')" && git push)
